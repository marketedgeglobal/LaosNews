      - "order cancellation"
      - "supply disruption"
      - compliance
      - "input cost"
      - "trade barrier"
      - "labor shortage"

  food_agriculture:
    label: "Food & Agriculture"
    include:
      - rice
      - coffee
      - "sticky rice"
      - cassava
      - maize
      - rubber
      - sugarcane
      - plantation
      - "organic farming"
      - livestock
      - fisheries
      - irrigation
      - aquaculture
      - "food security"
      - "agricultural exports"
    opportunity:
      - "input supply"
      - distribution
      - cold chain
