  education_workforce:
    label: "Education & Workforce"
    include:
      - education
      - schools
      - teachers
      - curriculum
      - tvet
      - "technical training"
      - "workforce"
      - employment
      - labor
      - skills
      - "digital learning"
      - "vocational"
      - "higher education"
      - university
    opportunity:
