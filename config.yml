# Laos Update Intelligence - config.yml
# Purpose: Generate weekly, sector-structured news briefs and opportunity flags for Laos

# --- Scope / Country Targeting ---
country:
  name: "Laos"
  official_name: "Lao People's Democratic Republic"
  iso2: "LA"
  iso3: "LAO"
  currency_code: "LAK"   # Lao kip

# --- Scheduling / Recency ---
max_age_days: 20
prefer_published_date: true

# --- Output Control ---
max_results: 60
summary_max_chars: 520
section_item_limit: 10

article_extraction:
  enabled: true
  max_items: 20
  timeout_seconds: 6
  min_chars: 240
  max_chars: 6000
  blocked_domains:
    - oilprice.com
    - msn.com

selection:
  min_per_section: 3
  max_per_section: 8
  min_per_language:
    en: 10
    es: 10

brief_sections:
  - "Extractives & Mining"
  - "Energy"
  - "Food & Agriculture"
  - "Textile & Handicraft"
  - "Health & Water"
  - "Education & Workforce"
  - "Finance & Investment"
  - "ASEAN Economic Community Integration"
  - "Cross-cutting / Policy / Risk"

# --- Core Entity Filters ---
require_country_match: true

country_terms:
  - laos
  - lao
  - "lao pdr"
  - "lao people's democratic republic"
  - vientiane
  - luang prabang
  - pakse
  - savannakhet
  - champasak
  - attapeu
  - mekong
  - "bolikhamxay"
  - "houaphanh"
  - "xieng khouang"
  - "lao government"

geo_context_terms:
  - thailand border
  - vietnam border
  - cambodia border
  - myanmar border
  - china yunnan
  - greater mekong
  - asean
  - "mekong river"

# --- Sectors & Keywords ---
sectors:
  extractives_mining:
    label: "Extractives & Mining"
    include:
      - mining
      - copper
      - gold
      - bauxite
      - potash
      - "rare earth"
      - "sepon mine"
      - "mineral exploration"
      - "mining concession"
    opportunity:
      - licensing
      - license
      - tender
      - procurement
      - rfp
      - "request for proposal"
      - concession
      - "production restart"
      - "field development"
      - "service contract"
      - "offtake"
      - "farm-in"
      - "strategic partner"
      - "capex"
      - "project finance"
    risk:
      - spill
      - explosion
      - outage
      - sanctions
      - embargo
      - seizure
      - "asset freeze"

  energy:
    label: "Energy"
    include:
      - energy
      - electricity
      - power
      - "power generation"
      - hydropower
      - "nam theun"
      - "nam ngam"
      - "don sahong"
      - "xayaburi dam"
      - "grid"
      - transmission
      - "renewable"
      - solar
      - wind
      - battery
      - "cross-border power trade"
      - "energy ministry"
      - "edl"
      - "edl-gen"
    opportunity:
      - tender
      - procurement
      - concession
      - ppa
      - "power purchase agreement"
      - "epc contract"
      - "grid expansion"
      - "generation project"
      - "project finance"
      - "strategic partner"
    risk:
      - outage
      - curtailment
      - blackout
      - drought
      - delay
      - sanctions

  textile_handicraft:
    label: "Textile & Handicraft"
    include:
      - textile
      - textiles
      - garment
      - garments
      - apparel
      - fashion
      - weaving
      - weaver
      - silk
      - cotton
      - yarn
      - handicraft
      - handicrafts
      - handcraft
      - handcrafts
      - craft
      - crafts
      - handloom
      - artisan
      - artisans
      - "made in laos"
      - "small producer"
      - "craft village"
      - "export promotion"
      - "export market"
      - "value addition"
      - "value chain"
    opportunity:
      - export
      - buyer
      - sourcing
      - order
      - contract
      - fair
      - exhibition
      - "market access"
      - certification
      - "trade mission"
      - "capacity building"
