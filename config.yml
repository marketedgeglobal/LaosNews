    include:
      - health
      - hospital
      - clinic
      - medicine
      - vaccines
      - surveillance
      - epidemiology
      - outbreak
      - cholera
      - dengue
      - malaria
      - "public health"
      - water
      - sanitation
      - wastewater
      - wwtp
      - "drinking water"
      - wssh
      - wash
      - hygiene
