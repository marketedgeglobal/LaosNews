      - "single window"
      - "asean single window"
      - "trade agreement"
      - "trade agreements"
      - "trade facilitation"
      - "customs modernization"
      - customs
      - "cross-border trade"
      - exports
      - "export growth"
      - "digital trade"
      - "digital data"
      - interoperability
      - "data exchange"
      - "logistics corridor"
      - infrastructure
      - "connectivity"
    opportunity:
      - "mutual recognition"
      - "market access"
      - harmonization
      - "rules of origin"
      - "single window rollout"
      - "customs reform"
      - "trade corridor"
      - "export growth"
