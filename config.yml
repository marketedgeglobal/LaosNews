# --- Cross-cutting Business Signal Terms ---
business_signal_terms:
  - tender
  - procurement
  - contract award
  - "call for bids"
  - "expression of interest"
  - "request for proposals"
  - rfp
  - rfq
  - "request for quotation"
  - "grant funding"
  - "financing approved"
  - "loan approved"
  - "project announced"
  - "investment plan"
  - "partnership"
  - "joint venture"
  - "regulatory reform"
  - "sanctions relief"
  - "license granted"
  - "market liberalization"

# --- Negative / Noise Filtering ---
exclude_terms:
  - football
  - soccer
  - baseball
  - celebrity
  - entertainment
  - horoscope
  - sports betting

# --- Scoring ---
scoring:
  weights:
    country_match: 0.20
    sector_relevance: 0.30
    business_signals: 0.25
    recency: 0.15
    source_priority: 0.10
  recency_decay: "linear"
  multi_sector_bonus: 0.10

# --- Source Weights / Priorities ---
source_weights:
  "reliefweb.int": 1.4
  "worldbank.org": 1.4
  "imf.org": 1.4
  "adb.org": 1.4
  "asean.org": 1.3
  "ilo.org": 1.35
  "intracen.org": 1.35
  "wto.org": 1.3
  "unctad.org": 1.3
  "apnews.com": 1.3
  "reuters.com": 1.1
  "ft.com": 1.05
  "bloomberg.com": 1.05
  "bangkokpost.com": 1.2
  "nationthailand.com": 1.15

# --- Deduplication ---
deduplication:
  strategy: "title_url"
  title_similarity_threshold: 0.90

# --- Optional Output Flags ---
flags:
  opportunity_flag_terms:
    - tender
    - procurement
    - "call for bids"
    - "expression of interest"
    - concession
    - licensing
    - "sanctions relief"
    - privatization
    - "project finance"
    - "investment framework"

  risk_flag_terms:
    - sanctions
    - "political unrest"
    - outage
    - spill
    - default
    - devaluation
    - outbreak
    - emergency
